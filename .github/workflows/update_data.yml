# Force-trigger activation commit for GitHub Actions parser
name: SET Stock Data Daily Auto-Update

on:
  schedule:
    # Run every day at 11:30 UTC (which is 18:30 / 6:30 PM Thailand Time)
    - cron: '30 11 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI if needed

permissions:
  contents: write # Allows pushing the updated files back to GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance

    - name: Run SET Data Updater Script
      run: python updater.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add stocks_data.json stocks_data.js
        # Commit only if changes were detected to prevent empty build triggers
        if git diff --staged --quiet; then
          echo "No changes in stock data detected. Skipping commit."
        else
          git commit -m "Auto-Update SET stock data: price fluctuations, XD events, and broker targets"
          git push
        fi
